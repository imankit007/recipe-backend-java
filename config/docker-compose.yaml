version: "3.9"
name: "recipes-backend"
services:
  postgres:
    image: postgres:16
    container_name: recipe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipe_db
      POSTGRES_USER: postgres
      TZ: Asia/Kolkata
      PGTZ: Asia/Kolkata
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:16
    container_name: recipe-db-init
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./init.sql:/init.sql
    command: psql -h postgres -U postgres -d recipe_db -f /init.sql
    restart: "no"

  recipe-api-service:
    build: ../recipe-api
    image: recipe-api-service:latest
    container_name: recipe-api-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recipe_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      GRPC_CLIENT_AUTH-SERVICE_ADDRESS: static://recipe-auth:50054
      SERVER_PORT: "8080"
    depends_on:
      db-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  recipe-auth:
    build: ../recipe-auth
    image: recipe-auth:latest
    container_name: recipe-auth
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/recipe_user_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SERVER_PORT: "8080"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: us-east-1
      S3_BUCKET: recipe-media
    depends_on:
      db-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  recipe-gateway:
    build: ../recipe-gateway
    image: recipe-gateway:latest
    container_name: recipe-gateway
    restart: unless-stopped
    environment:
      RECIPE_SERVICE_URL: http://recipe-api-service:8080
      USER_SERVICE_URL: http://recipe-auth:8080
      SERVER_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      recipe-api-service:
        condition: service_healthy
      recipe-auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
  minio:
    image: minio/minio:latest
    container_name: recipe-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: recipe-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/init-minio.sh"]
    volumes:
      - ./minio:/scripts:ro
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      BUCKET: recipe-media
    restart: "no"

volumes:
  postgres_data:
  minio_data:
